<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="main.css">
    <script src="main.js" type="module"></script>
    <title>Document</title>
</head>
<body>
    <header>
        <img id="menu-icon" src="HamburgareMeny.svg">
        <h1>Dejt app namn</h1>
        <img id="sök-icon" src="sök.svg">
        <nav id="hidden-nav">
            <ul>

                <li><a href="#">Hem</a></li>
                <li><a href="#">Slumpa dejt</a></li>
                <li><a href="#">Kalender</a></li>
                <li><a href="#">Profil</a></li> 
                <li><a href="#">Sparade dejter</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div>
            <h2>Populära dejter</h2>
            <img src="cook.jpg" alt="">
            <img src="cook.jpg" alt="">
        </div>
        <hr>
        <div>
            <form>
                <div class="field">
                <label for="place">Plats</label>
                <select name="place" id="place">
                    <option value="alla">Alla</option>
                    <option value="utomhus">Utomhus</option>
                    <option value="inomhus">Inomhus</option>
                    <option value="hemma">Hemma</option>
                </select>
                </div>
                <div class="field">
                <label for="price">Max pris</label>
                <input type="range" name="price" id="price" min="0" max="1000">
                </div>
                <div class="field">
                <label for="time">Tid</label>
                <select name="time" id="time">
                    <option value="alla">Alla</option>
                    <option value="hour">En timme</option>
                    <option value="halvdag">Halvdag</option>
                    <option value="heldag">Heldag</option>
                </select>
                </div>
            </form>
        </div>
        <div id="card">
            <img class="kort-bild" src="cook.jpg" alt="">
            <div id="card-besk">
            <h3>Tre rätters</h3>
            <p>Kort beskrivning</p>

            </div>
            <img id="spara-icon" src="spara.svg">
        </div>
    </main>
    <footer>
        <p>&copy; 2026 Dejt app namn. Alla rättigheter förbehållna.</p>
    </footer>
